name: Build and Deploy Frontend to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: gen-lang-client-0493260544
  GAR_LOCATION: europe-west1
  SERVICE: serviceapotheke-web
  REGION: europe-west1
  WIF_PROVIDER: ${{ secrets.WIF_PROVIDER_NAME }}
  WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT_EMAIL }}
  PROD_API_URL: ${{ secrets.PROD_API_URL }}

jobs:
  test:
    name: Run Playwright E2E
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Build and Start Next.js
      run: |
        npm run build
        cp -r public .next/standalone/
        cp -r .next/static .next/standalone/.next/
        PORT=3000 node .next/standalone/server.js &
        npx wait-on http://localhost:3000 -t 60000
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy:
    name: Build and Deploy
    needs: test
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/serviceapotheke/web:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/serviceapotheke/web:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/serviceapotheke/web:${{ github.sha }}
          env_vars: |
            NEXT_PUBLIC_API_URL=/api

      - name: Make Cloud Run Service Public
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker"
